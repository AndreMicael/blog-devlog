<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}" />
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="blog-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="blog-title-link">
        <h1 class="blog-title">{{ site.title }}</h1>
      </a>
      <p class="blog-description">{{ site.description }}</p>
      <nav class="blog-nav">
        <a href="{{ '/' | relative_url }}">Início</a>
        <a href="{{ '/categories/' | relative_url }}">Categorias</a>
        <a href="{{ '/tags/' | relative_url }}">Tags</a>
      </nav>
    </div>
  </header>

  <div class="blog-container">
    <main class="blog-main">
      {{ content }}
    </main>
    {% include sidebar.html %}
  </div>

  <footer class="blog-footer">
    <p>© {{ site.time | date: '%Y' }} <strong>{{ site.author.name }}</strong> &mdash; Dev Log gerado automaticamente por IA a partir de commits reais.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/simple-jekyll-search@1.10.0/dest/simple-jekyll-search.min.js"></script>
  <script>
    SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('search-results'),
      json: '{{ "/search.json" | relative_url }}',
      searchResultTemplate: '<li><a href="{url}"><span class="search-result-title">{title}</span><span class="search-result-date">{date}</span></a></li>',
      noResultsText: '<li class="no-results">Nenhum resultado encontrado.</li>',
      limit: 8,
      fuzzy: false
    });

    document.getElementById('search-input').addEventListener('focus', function() {
      document.getElementById('search-results').style.display = 'block';
    });
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.search-box')) {
        document.getElementById('search-results').style.display = 'none';
      }
    });
  </script>

</body>
</html>
