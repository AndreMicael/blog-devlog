# Configuração do gerador de posts de blog

# Idioma dos posts gerados
language: "português"

# Máximo de commits por repositório para incluir em um post
max_commits_per_repo: 10

# Lista de repositórios para monitorar
repos:
  - owner: Desenvolve-MT
    name: Sistema-Contratos-Frontend
    branch: dev

  - owner: Desenvolve-MT
    name: Sistema-Contratos-Backend
    branch: dev
